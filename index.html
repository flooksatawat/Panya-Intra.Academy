<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ห้องเรียนออนไลน์ สำนักงานปัญญา-อินทรา</title>
    
    <!-- External Resources -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap');
        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: #f8fafc;
            overflow-x: hidden;
        }
        .video-container { position: relative; padding-top: 56.25%; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-header { animation: fadeInDown 0.6s ease-out forwards; }
        
        .gold-gradient-text {
            background: linear-gradient(to right, #fde68a, #fbbf24, #d97706, #fbbf24, #fde68a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: shine 4s linear infinite;
        }
        
        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* Custom Scrollbar - Compact Style */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        main { max-width: 100vw; }
    </style>
</head>
<body class="text-gray-900 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const COURSE_VIDEOS = [
            { 
                id: '1pX1Die57OvDN-r2J_uAFBhYcAJc7k31G', 
                title: 'CI Extra Plus', 
                duration: '3:32',
                docTitle: 'ข้อเสนอ CI Extra Plus',
                docUrl: 'https://shorturl.at/DmPL4'
            },
            { 
                id: '15JXmCHGp0n6UzpexBYJLEk7XQvxDfVCM', 
                title: 'Signature Lagecy', 
                duration: '0:28',
                docTitle: 'คู่มือ Signature Legacy.pdf',
                docUrl: '' 
            },
            { 
                id: '1b11FYjs-s4pTnnfZwRl3Fff0GKYwDJQ2', 
                title: 'Supreme Hybrid', 
                duration: '1:30',
                docTitle: 'ข้อเสนอ Supreme Hybrid',
                docUrl: 'https://docs.google.com/spreadsheets/d/10b1RsFl7OftY_zw3H35Un7Sorop2TlJI/edit?usp=drive_link&ouid=107270837925451774495&rtpof=true&sd=true',
                pptUrl: 'https://docs.google.com/presentation/d/15z8f-dmgr_YFJ-D1QILSSqSnTor1gebj/edit?usp=drivesdk&ouid=116899021092944722535&rtpof=true&sd=true'
            },
            { 
                id: '1MZ2kbuoUpQs6ZtxkXSRCLDJK__VZNJeu', 
                title: 'Medical Fund', 
                duration: '3:50',
                pptUrl: 'https://docs.google.com/presentation/d/116CnIvFr561G0-Uo_vpXryp-le-EH0JP/edit?usp=drivesdk&ouid=116899021092944722535&rtpof=true&sd=true'
            },
            { 
                id: '1aUYRs-0ZaJZqPEASjQ5ubjS_JuUJxhDl', 
                title: 'CONVERTIBLE TERM', 
                duration: '4:15',
                pptUrl: 'https://drive.google.com/drive/folders/1lLeYg3hnbuVjno-D7w8uWM-KJSRnBfiw'
            },
            { 
                id: '1mWOKwXxmmjC69e1lmB99JL85pe4Y7Nck', 
                title: 'Asset Design', 
                duration: '5:20',
                pptUrl: 'https://docs.google.com/presentation/d/1Y7y-bUnfmxPER2Yr_UIobt-HcijJEH5w/edit?usp=drivesdk&ouid=116899021092944722535&rtpof=true&sd=true'
            },
            { 
                id: '1K2ipwgcwv63wqc6cSYodmZpnfNPnzTo4', 
                title: '3D Health Excellence', 
                duration: '4:50',
                moreTitle: 'เพิ่มเติม',
                moreUrl: 'https://docs.google.com/document/d/15bmmvEsX9vUg_iaXTltPzth_q1U90LOmRJa5gYBY4uY/edit?tab=t.0'
            }
        ];

        const App = () => {
            const [currentVideo, setCurrentVideo] = useState(COURSE_VIDEOS[0]);
            const [progress, setProgress] = useState({}); // { videoId: count }
            const [toasts, setToasts] = useState([]);

            useEffect(() => {
                const savedProgress = localStorage.getItem('agent_class_progress_counts');
                if (savedProgress) setProgress(JSON.parse(savedProgress));
            }, []);

            const addToast = (message, type = 'info') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 4000);
            };

            const handleVideoCompleted = (video) => {
                const currentCount = progress[video.id] || 0;
                const newProgress = { ...progress, [video.id]: currentCount + 1 };
                setProgress(newProgress);
                localStorage.setItem('agent_class_progress_counts', JSON.stringify(newProgress));
                addToast(`ยินดีด้วย! คุณเรียนจบ: ${video.title} (รอบที่ ${currentCount + 1})`, 'success');
            };

            const calculateCompletionPercent = () => {
                const total = COURSE_VIDEOS.length;
                const completedCount = COURSE_VIDEOS.filter(v => progress[v.id] > 0).length;
                return Math.round((completedCount / total) * 100);
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Compact Header */}
                    <header className="bg-gradient-to-b from-[#0a192f] to-[#0f172a] text-white shadow-lg z-20 sticky top-0 py-3 md:py-4 border-b border-yellow-600/20">
                        <div className="max-w-7xl mx-auto px-4 flex flex-col items-center justify-center animate-header">
                            <div className="flex flex-col items-center gap-1 md:gap-2">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" className="text-yellow-500 md:w-10 md:h-10">
                                    <path d="M12 21L12 5M12 21C10 21 5.5 19.5 3 19V5C5.5 5.5 10 7 12 7M12 21C14 21 18.5 19.5 21 19V5C18.5 5.5 14 7 12 7" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                                    <path d="M12 3L15 6L12 9L9 6L12 3Z" fill="currentColor" fillOpacity="0.8" />
                                </svg>
                                
                                <div className="text-center">
                                    <h1 className="text-xl md:text-3xl font-extrabold tracking-tight gold-gradient-text uppercase leading-tight">
                                        ห้องเรียนออนไลน์
                                    </h1>
                                    <h2 className="text-sm md:text-xl font-bold text-white tracking-wide opacity-90 -mt-1">
                                        สำนักงานปัญญา-อินทรา
                                    </h2>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 max-w-7xl mx-auto w-full px-2 sm:px-4 py-3 md:py-6 flex flex-col lg:flex-row items-stretch gap-4 md:gap-6">
                        {/* LEFT COLUMN: Video & Details */}
                        <div className="flex-1 flex flex-col gap-4 md:gap-6">
                            {/* Video Container */}
                            <div className="bg-black rounded-xl md:rounded-2xl overflow-hidden shadow-2xl video-container border-2 md:border-4 border-white shadow-blue-900/10 shrink-0">
                                <iframe 
                                    src={`https://drive.google.com/file/d/${currentVideo.id}/preview`} 
                                    allow="autoplay"
                                    title={currentVideo.title}
                                    frameBorder="0"
                                ></iframe>
                            </div>
                            
                            {/* Lesson Details Card */}
                            <div className="bg-white rounded-xl md:rounded-2xl shadow-sm border border-gray-100 ring-1 ring-black/5 overflow-hidden flex flex-col h-full">
                                <div className="p-5 md:p-8 flex flex-col h-full">
                                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-auto">
                                        <div className="flex-1">
                                            <h2 className="text-2xl md:text-4xl font-extrabold text-[#0a192f] leading-tight">
                                                {currentVideo.title}
                                            </h2>
                                            <div className="flex items-center gap-3 mt-2">
                                                <span className="flex items-center gap-2 text-blue-700 text-sm md:text-base font-bold bg-blue-50 px-4 py-1.5 rounded-full border border-blue-100">
                                                    <svg className="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                                    {currentVideo.duration} นาที
                                                </span>
                                                {progress[currentVideo.id] > 0 && (
                                                    <span className="text-gray-500 text-sm md:text-base font-medium flex items-center gap-1.5">
                                                        <span className="w-1.5 h-1.5 bg-green-500 rounded-full"></span>
                                                        เรียนไปแล้ว {progress[currentVideo.id]} รอบ
                                                    </span>
                                                )}
                                            </div>
                                        </div>
                                        
                                        <div className="shrink-0 w-full sm:w-auto flex flex-col sm:flex-row gap-2">
                                            {progress[currentVideo.id] > 0 ? (
                                                <>
                                                    <div className="bg-green-50 text-green-700 px-6 py-4 rounded-xl flex items-center justify-center gap-3 font-extrabold border border-green-200 text-lg shadow-sm">
                                                        <svg className="w-6 h-6 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7" /></svg>
                                                        เรียนจบแล้ว
                                                    </div>
                                                    <button 
                                                        onClick={() => handleVideoCompleted(currentVideo)}
                                                        className="bg-blue-600 hover:bg-blue-700 text-white px-6 py-4 rounded-xl flex items-center justify-center gap-3 font-extrabold shadow-lg transition-all transform active:scale-95 text-lg"
                                                    >
                                                        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                                                        เรียนซ้ำ
                                                    </button>
                                                </>
                                            ) : (
                                                <button 
                                                    onClick={() => handleVideoCompleted(currentVideo)}
                                                    className="bg-[#0a192f] hover:bg-blue-900 text-white px-10 py-4 w-full sm:w-auto rounded-xl flex items-center justify-center gap-3 font-extrabold shadow-xl transition-all transform active:scale-95 text-lg border-b-4 border-blue-800"
                                                >
                                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                                    คลิกยืนยันเมื่อเรียนจบ
                                                </button>
                                            )}
                                        </div>
                                    </div>

                                    {/* PROGRESS SECTION */}
                                    <div className="pt-8 border-t border-gray-100 mt-8">
                                        <div className="flex items-center justify-between mb-3">
                                            <h3 className="text-sm md:text-lg font-bold text-[#43236e] uppercase tracking-wider flex items-center gap-2">
                                                <svg className="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg>
                                                เพิ่มความรู้ เพิ่มรายได้
                                            </h3>
                                            <span className="text-2xl md:text-3xl font-black text-blue-700">{calculateCompletionPercent()}%</span>
                                        </div>
                                        <div className="w-full bg-gray-100 rounded-full h-4 md:h-5 p-1.5 shadow-inner ring-1 ring-black/5">
                                            <div className="bg-gradient-to-r from-blue-600 to-blue-900 h-full rounded-full transition-all duration-1000 ease-out shadow-md" style={{ width: `${calculateCompletionPercent()}%` }}></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* RIGHT COLUMN: Sidebar (Lessons List) */}
                        <div className="w-full lg:w-80 xl:w-96 flex flex-col shrink-0">
                            <div className="bg-white rounded-xl md:rounded-2xl shadow-xl border border-gray-100 overflow-hidden flex flex-col ring-1 ring-black/5 h-full">
                                <div className="bg-gradient-to-r from-[#fcfaff] to-white p-4 md:p-5 border-b border-gray-100">
                                    <h3 className="font-extrabold text-[#0a192f] uppercase tracking-wider text-xs md:text-sm flex items-center gap-2">
                                        <div className="w-1.5 h-6 bg-blue-600 rounded-full"></div>
                                        แบบประกัน & ไอเดียการขาย
                                    </h3>
                                </div>
                                <ul className="divide-y divide-gray-50 overflow-y-auto flex-1">
                                    {COURSE_VIDEOS.map((video) => {
                                        const isCurrent = currentVideo.id === video.id;
                                        const studyCount = progress[video.id] || 0;

                                        return (
                                            <li 
                                                key={video.id}
                                                onClick={() => setCurrentVideo(video)}
                                                className={`p-4 cursor-pointer hover:bg-blue-50/50 transition-all flex gap-4 border-l-4 ${isCurrent ? 'bg-blue-50 border-blue-600 shadow-inner' : 'border-transparent opacity-90'}`}
                                            >
                                                <div className="shrink-0 pt-1">
                                                    {studyCount > 0 ? (
                                                        <div className="w-7 h-7 rounded-full bg-green-500 flex items-center justify-center text-white shadow-md shadow-green-100">
                                                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7" /></svg>
                                                        </div>
                                                    ) : (
                                                        <div className={`w-7 h-7 rounded-full border-2 flex items-center justify-center text-white transition-all ${isCurrent ? 'border-blue-900 bg-[#0a192f]' : 'border-gray-200 bg-gray-50'}`}>
                                                            <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                                        </div>
                                                    )}
                                                </div>
                                                <div className="flex-1 overflow-hidden">
                                                    <div className="flex justify-between items-start gap-1">
                                                        <p className={`font-bold text-sm leading-snug truncate transition-colors ${isCurrent ? 'text-blue-900' : 'text-gray-700'}`}>
                                                            {video.title}
                                                        </p>
                                                        <p className="text-[12px] md:text-sm font-black text-blue-600 bg-blue-100/50 px-2 py-0.5 rounded-lg shrink-0 shadow-sm">
                                                            {video.duration}
                                                        </p>
                                                    </div>
                                                    
                                                    {studyCount > 0 && (
                                                        <p className="text-[10px] font-bold text-green-600 mt-1 uppercase italic tracking-tighter">
                                                            สะสมแล้ว {studyCount} รอบ
                                                        </p>
                                                    )}
                                                    
                                                    <div className="flex flex-wrap gap-1.5 mt-3">
                                                        {(video.docTitle || video.docUrl) && (
                                                            <button 
                                                                onClick={(e) => {
                                                                    e.stopPropagation();
                                                                    if (video.docUrl) window.open(video.docUrl, '_blank');
                                                                    else addToast(`กำลังเตรียมเอกสาร ${video.docTitle}`, 'info');
                                                                }}
                                                                className="inline-flex items-center gap-1 px-2 py-1 text-[10px] font-black text-green-700 bg-green-50 rounded border border-green-100 hover:bg-green-600 hover:text-white transition-all shadow-sm"
                                                            >
                                                                <svg className="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M2 3h20v18H2V3zm2 2v4h4V5H4zm6 0v4h4V5h-4zm6 0v4h4V5h-4zM4 11v4h4v-4H4zm6 0v4h4v-4h-4zm6 0v4h4v-4h-4zM4 17v2h4v-2H4zm6 0v2h4v-2h-4zm6 0v2h4v-2h-4z" /></svg>
                                                                EXCEL
                                                            </button>
                                                        )}
                                                        
                                                        {video.pptUrl && (
                                                            <button 
                                                                onClick={(e) => {
                                                                    e.stopPropagation();
                                                                    window.open(video.pptUrl, '_blank');
                                                                }}
                                                                className="inline-flex items-center gap-1 px-2 py-1 text-[10px] font-black text-white bg-orange-500 rounded hover:bg-orange-600 transition-all shadow-sm"
                                                            >
                                                                <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" /></svg>
                                                                PPT
                                                            </button>
                                                        )}

                                                        {video.moreUrl && (
                                                            <button 
                                                                onClick={(e) => {
                                                                    e.stopPropagation();
                                                                    window.open(video.moreUrl, '_blank');
                                                                }}
                                                                className="inline-flex items-center gap-1 px-2 py-1 text-[10px] font-black text-white bg-indigo-600 rounded hover:bg-indigo-700 transition-all shadow-sm"
                                                            >
                                                                <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                                                MORE
                                                            </button>
                                                        )}
                                                    </div>
                                                </div>
                                            </li>
                                        );
                                    })}
                                </ul>
                            </div>
                        </div>
                    </main>

                    {/* Toast System */}
                    <div className="fixed bottom-6 right-6 flex flex-col gap-3 z-50">
                        {toasts.map(toast => (
                            <div key={toast.id} className={`px-6 py-4 rounded-2xl shadow-2xl text-white text-xs md:text-sm font-bold animate-fade-in-up flex items-center gap-4 border backdrop-blur-md ${toast.type === 'success' ? 'bg-green-600/95 border-green-400' : 'bg-blue-900/95 border-blue-400'}`}>
                                <div className="w-6 h-6 rounded-full bg-white/20 flex items-center justify-center shrink-0">
                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7" /></svg>
                                </div>
                                {toast.message}
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
