<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ห้องเรียนออนไลน์ สำนักงานปัญญา-อินทรา</title>
    
    <!-- นำเข้า Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- นำเข้า React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- นำเข้า Babel สำหรับแปลงโค้ด JSX ให้เบราว์เซอร์รู้จัก -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <!-- โค้ด Application หลัก -->
    <script type="text/babel" data-type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js';
        import { getFirestore, collection, doc, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js';

        const { useState, useEffect, useRef } = React;

        // ==========================================
        // 1. การตั้งค่า Firebase & Environment
        // ==========================================
        let app, auth, db;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'insurance-class-demo';

        try {
            if (typeof __firebase_config !== 'undefined') {
                const firebaseConfig = JSON.parse(__firebase_config);
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
            }
        } catch (error) {
            console.error("Firebase initialization error:", error);
        }

        // ==========================================
        // 2. ข้อมูลวิดีโอหลักสูตร (จำลอง)
        // ==========================================
        const COURSE_VIDEOS = [
            { id: 'lON84ADArYo', title: 'บทที่ 1: แบบประกัน CI Extra Plus', duration: '3:32' },
            { id: '15JXmCHGp0n6UzpexBYJLEk7XQvxDfVCM', title: 'บทที่ 2: แบบประกัน Signature Lagecy', duration: '0:28' },
            { id: 'M7lc1UVf-VE', title: 'บทที่ 3: พื้นฐานแบบประกันและการวิเคราะห์ความต้องการ', duration: '1:30' },
            { id: 'kJQP7kiw5Fk', title: 'บทที่ 4: เทคนิคการเปิดใจและเข้าพบลูกค้า', duration: '3:50' },
            { id: '9bZkp7q19f0', title: 'บทที่ 5: ตัวอย่างการเพิ่มวิดีโอใหม่ (Psy - Gangnam Style)', duration: '4:12' }
        ];

        // ข้อมูลเอกสารประกอบการเรียน (อัปเดตให้รองรับ URL จริง)
        // คุณสามารถเพิ่ม url ของ Google Drive หรือไฟล์ที่ฝากไว้บนเว็บได้ที่ฟิลด์ 'url'
        const ADDITIONAL_DOCS = [
            { id: 1, title: 'Excel ข้อเสนอ CI Extra Plus', url: 'https://shorturl.at/DmPL4' }, // ตัวอย่างใส่ลิงก์
            { id: 2, title: 'สรุปแผนประกัน (อัปเดตล่าสุด).pdf', size: '1.1 MB', type: 'PDF', url: 'https://www.google.com' }, // ตัวอย่างใส่ลิงก์
            { id: 3, title: 'แบบฟอร์มคำขอเอาประกันชีวิต.pdf', size: '800 KB', type: 'PDF', url: '' }, // ถ้าเว้นว่างไว้ จะแสดงเป็นการจำลอง
            { id: 4, title: 'สคริปต์การนำเสนอขาย (Sales Script).docx', size: '450 KB', type: 'DOCX', url: '' },
            // วิธีเพิ่ม: คัดลอกบรรทัดบนมาวาง แล้วเปลี่ยนข้อมูลด้านใน รวมถึงใส่ลิงก์ Google Drive ของคุณในช่อง url
        ];

        // ==========================================
        // 3. Components หลัก
        // ==========================================
        const App = () => {
            const [user, setUser] = useState(null);
            const [progress, setProgress] = useState({});
            const [currentVideo, setCurrentVideo] = useState(COURSE_VIDEOS[0]);
            const [playerReady, setPlayerReady] = useState(false);
            const [toasts, setToasts] = useState([]);
            
            const [showDocs, setShowDocs] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [webhookUrl, setWebhookUrl] = useState('');

            const playerRef = useRef(null);
            const ytReadyRef = useRef(false);

            useEffect(() => {
                if (!auth) return;

                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (err) {
                        console.error("Auth error:", err);
                    }
                };

                initAuth();

                const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                });

                const savedWebhook = localStorage.getItem('insurance_webhook_url');
                if (savedWebhook) setWebhookUrl(savedWebhook);

                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user || !db) return;

                const progressRef = collection(db, 'artifacts', appId, 'users', user.uid, 'progress');
                
                const unsubscribe = onSnapshot(progressRef, (snapshot) => {
                    const newProgress = {};
                    snapshot.forEach(doc => {
                        newProgress[doc.id] = doc.data().completed;
                    });
                    setProgress(newProgress);
                }, (error) => {
                    console.error("Error fetching progress:", error);
                });

                return () => unsubscribe();
            }, [user]);

            useEffect(() => {
                if (!window.YT) {
                    const tag = document.createElement('script');
                    tag.src = "https://www.youtube.com/iframe_api";
                    const firstScriptTag = document.getElementsByTagName('script')[0];
                    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

                    window.onYouTubeIframeAPIReady = () => {
                        ytReadyRef.current = true;
                        initPlayer(currentVideo.id);
                    };
                } else if (window.YT && window.YT.Player && !playerRef.current) {
                    ytReadyRef.current = true;
                    initPlayer(currentVideo.id);
                }

                return () => {
                    if (playerRef.current) {
                        playerRef.current.destroy();
                        playerRef.current = null;
                    }
                };
            }, []);

            useEffect(() => {
                if (playerRef.current && ytReadyRef.current && playerReady) {
                    playerRef.current.loadVideoById(currentVideo.id);
                } else if (ytReadyRef.current && !playerRef.current) {
                    initPlayer(currentVideo.id);
                }
            }, [currentVideo]);

            const initPlayer = (videoId) => {
                if (playerRef.current) return;
                
                playerRef.current = new window.YT.Player('ytplayer', {
                    height: '100%',
                    width: '100%',
                    videoId: videoId,
                    playerVars: {
                        'playsinline': 1,
                        'rel': 0,
                        'modestbranding': 1
                    },
                    events: {
                        'onReady': () => setPlayerReady(true),
                        'onStateChange': onPlayerStateChange
                    }
                });
            };

            const onPlayerStateChange = (event) => {
                if (event.data === 0) {
                    handleVideoCompleted(currentVideo);
                }
            };

            const handleVideoCompleted = async (video) => {
                if (progress[video.id]) return;

                setProgress(prev => ({ ...prev, [video.id]: true }));
                addToast(`🎉 ยินดีด้วย! คุณเรียนจบ: ${video.title}`, 'success');

                if (user && db) {
                    try {
                        const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'progress', video.id);
                        await setDoc(docRef, {
                            completed: true,
                            completedAt: new Date().toISOString(),
                            videoTitle: video.title
                        }, { merge: true });
                    } catch (err) {
                        console.error("Failed to save progress", err);
                    }
                }

                sendLineNotification(video.title);
            };

            const sendLineNotification = async (videoTitle) => {
                const agentName = user ? `ตัวแทน ID: ${user.uid.substring(0, 6)}` : "ตัวแทนใหม่";
                const message = `\n🎓 แจ้งเตือนการเรียน\nผู้เรียน: ${agentName}\nเรียนจบ: ${videoTitle}\nสถานะ: ผ่าน ✅`;

                if (!webhookUrl) {
                    setTimeout(() => {
                        addToast(`(จำลอง LINE) 🔔 ${message}`, 'info');
                    }, 1000);
                    return;
                }

                try {
                    await fetch(webhookUrl, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ message: message, video: videoTitle, user: agentName })
                    });
                    addToast(`ส่งแจ้งเตือนเข้า LINE กลุ่มสำเร็จ!`, 'success');
                } catch (error) {
                    console.error("Webhook error:", error);
                    addToast(`ระบบส่งแจ้งเตือนล้มเหลว (ตรวจสอบ Webhook URL)`, 'error');
                }
            };

            const addToast = (message, type = 'info') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => {
                    setToasts(prev => prev.filter(t => t.id !== id));
                }, 5000);
            };

            const saveSettings = () => {
                localStorage.setItem('insurance_webhook_url', webhookUrl);
                setShowSettings(false);
                addToast('บันทึกการตั้งค่าระบบเรียบร้อย', 'success');
            };

            const calculateTotalProgress = () => {
                const total = COURSE_VIDEOS.length;
                const completed = COURSE_VIDEOS.filter(v => progress[v.id]).length;
                return Math.round((completed / total) * 100);
            };

            return (
                <div className="min-h-screen bg-gray-50 flex flex-col font-sans">
                    <header className="bg-blue-900 text-white shadow-md z-10 relative">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <svg className="w-8 h-8 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 14l9-5-9-5-9 5 9 5z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 14l9-5-9-5-9 5 9 5zm0 0v6" /></svg>
                                <h1 className="text-xl font-bold tracking-wide">ห้องเรียนออนไลน์ สำนักงานปัญญา-อินทรา</h1>
                            </div>
                            <div className="flex items-center gap-6">
                                <button 
                                    onClick={() => setShowDocs(true)}
                                    className="text-blue-200 hover:text-white transition-colors flex items-center gap-2 text-sm"
                                >
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                                    เอกสารเพิ่มเติม
                                </button>
                                <button 
                                    onClick={() => setShowSettings(true)}
                                    className="text-blue-200 hover:text-white transition-colors flex items-center gap-2 text-sm"
                                >
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                                    ตั้งค่าผู้ดูแล
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8 flex flex-col lg:flex-row gap-8">
                        <div className="flex-1 flex flex-col">
                            <div className="bg-black rounded-xl overflow-hidden shadow-lg relative" style={{ paddingTop: '56.25%' }}>
                                <div id="ytplayer" className="absolute top-0 left-0 w-full h-full border-0"></div>
                                {!playerReady && (
                                    <div className="absolute inset-0 flex items-center justify-center text-white bg-gray-900">
                                        <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-white"></div>
                                    </div>
                                )}
                            </div>

                            <div className="bg-black rounded-xl overflow-hidden shadow-lg relative" style={{ paddingTop: '56.25%' }}>
                                <iframe 
                                    src={`https://drive.google.com/file/d/${currentVideo.id}/preview`} 
                                    className="absolute top-0 left-0 w-full h-full border-0"
                                    allow="autoplay"
                                ></iframe>
                            </div>
                            
                            <div className="mt-6 bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                                <div className="flex justify-between items-start">
                                    <div>
                                        <h2 className="text-2xl font-bold text-gray-800 mb-2">{currentVideo.title}</h2>
                                        <p className="text-gray-500 text-sm">
                                            ดูให้จบเพื่อรับรองสถานะการผ่านบทเรียน ระบบจะแจ้งเตือนผู้จัดการ (หัวหน้าหน่วย) ของคุณอัตโนมัติเมื่อเรียนจบ
                                        </p>
                                    </div>
                                    {progress[currentVideo.id] && (
                                        <div className="bg-green-100 text-green-700 px-4 py-2 rounded-full flex items-center gap-2 font-medium border border-green-200">
                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>
                                            เรียนจบแล้ว
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>

                        <div className="w-full lg:w-1/3 flex flex-col gap-6">
                            <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                                <h3 className="text-lg font-bold text-gray-800 mb-4">ความคืบหน้าหลักสูตร</h3>
                                <div className="flex items-center justify-between mb-2">
                                    <span className="text-sm font-medium text-gray-600">สถานะรวม</span>
                                    <span className="text-sm font-bold text-blue-600">{calculateTotalProgress()}%</span>
                                </div>
                                <div className="w-full bg-gray-200 rounded-full h-2.5">
                                    <div 
                                        className="bg-blue-600 h-2.5 rounded-full transition-all duration-500" 
                                        style={{ width: `${calculateTotalProgress()}%` }}
                                    ></div>
                                </div>
                                <p className="text-xs text-gray-500 mt-3 text-center">
                                    ผู้ใช้งาน: {user ? user.uid.substring(0, 8) : 'กำลังเชื่อมต่อ...'}
                                </p>
                            </div>

                            <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden flex-1">
                                <div className="bg-gray-50 p-4 border-b border-gray-100">
                                    <h3 className="font-bold text-gray-800">สารบัญบทเรียน</h3>
                                </div>
                                <ul className="divide-y divide-gray-100 max-h-[500px] overflow-y-auto">
                                    {COURSE_VIDEOS.map((video, index) => {
                                        const isCurrent = currentVideo.id === video.id;
                                        const isCompleted = progress[video.id];

                                        return (
                                            <li 
                                                key={video.id}
                                                onClick={() => setCurrentVideo(video)}
                                                className={`p-4 cursor-pointer hover:bg-blue-50 transition-colors flex gap-3
                                                    ${isCurrent ? 'bg-blue-50 border-l-4 border-blue-500' : 'border-l-4 border-transparent'}
                                                `}
                                            >
                                                <div className="flex-shrink-0 mt-1">
                                                    {isCompleted ? (
                                                        <div className="w-6 h-6 rounded-full bg-green-500 flex items-center justify-center text-white">
                                                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>
                                                        </div>
                                                    ) : (
                                                        <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center text-xs font-bold
                                                            ${isCurrent ? 'border-blue-500 text-blue-500' : 'border-gray-300 text-gray-400'}
                                                        `}>
                                                            {index + 1}
                                                        </div>
                                                    )}
                                                </div>
                                                <div>
                                                    <p className={`font-medium text-sm leading-tight mb-1 ${isCurrent ? 'text-blue-700' : 'text-gray-700'}`}>
                                                        {video.title}
                                                    </p>
                                                    <p className="text-xs text-gray-500">{video.duration} นาที</p>
                                                </div>
                                            </li>
                                        );
                                    })}
                                </ul>
                            </div>
                        </div>
                    </main>

                    <div className="fixed bottom-4 right-4 flex flex-col gap-2 z-50">
                        {toasts.map(toast => (
                            <div 
                                key={toast.id} 
                                className={`px-6 py-3 rounded-lg shadow-lg text-white text-sm font-medium animate-fade-in-up flex items-center gap-2
                                    ${toast.type === 'success' ? 'bg-green-600' : toast.type === 'error' ? 'bg-red-600' : 'bg-blue-600'}
                                `}
                            >
                                {toast.type === 'success' && <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>}
                                {toast.message}
                            </div>
                        ))}
                    </div>

                    {showSettings && (
                        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden">
                                <div className="p-6 border-b border-gray-100 flex justify-between items-center">
                                    <h2 className="text-xl font-bold text-gray-800">ตั้งค่าระบบ (สำหรับหัวหน้าหน่วย)</h2>
                                    <button onClick={() => setShowSettings(false)} className="text-gray-400 hover:text-gray-600">
                                        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>
                                    </button>
                                </div>
                                <div className="p-6">
                                    <label className="block text-sm font-medium text-gray-700 mb-2">
                                        LINE Notify Webhook URL
                                    </label>
                                    <input 
                                        type="text"
                                        value={webhookUrl}
                                        onChange={(e) => setWebhookUrl(e.target.value)}
                                        placeholder="https://hook.make.com/..."
                                        className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm mb-2"
                                    />
                                    <p className="text-xs text-gray-500 mb-4">
                                        * เพื่อหลีกเลี่ยงปัญหา CORS ของ Browser กรุณานำ LINE Token ไปผูกกับระบบ Webhook (เช่น Make.com หรือ Google Apps Script) แล้วนำ URL มาใส่ที่นี่ หากเว้นว่างไว้ ระบบจะใช้โหมด "จำลองการแจ้งเตือน"
                                    </p>

                                    <div className="flex gap-3 justify-end mt-6">
                                        <button 
                                            onClick={() => setShowSettings(false)}
                                            className="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg text-sm font-medium transition-colors"
                                        >
                                            ยกเลิก
                                        </button>
                                        <button 
                                            onClick={saveSettings}
                                            className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm font-medium transition-colors shadow-sm"
                                        >
                                            บันทึกการตั้งค่า
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {showDocs && (
                        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-xl shadow-2xl w-full max-w-lg overflow-hidden">
                                <div className="p-6 border-b border-gray-100 flex justify-between items-center bg-blue-50">
                                    <h2 className="text-xl font-bold text-blue-900 flex items-center gap-2">
                                        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                                        เอกสารประกอบการเรียน
                                    </h2>
                                    <button onClick={() => setShowDocs(false)} className="text-gray-400 hover:text-gray-600">
                                        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>
                                    </button>
                                </div>
                                <div className="p-6 max-h-[60vh] overflow-y-auto">
                                    <ul className="divide-y divide-gray-100">
                                        {ADDITIONAL_DOCS.map(doc => (
                                            <li key={doc.id} className="py-4 flex justify-between items-center group">
                                                <div className="flex items-center gap-4">
                                                    <div className="p-3 bg-red-50 rounded-lg text-red-500">
                                                        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" /></svg>
                                                    </div>
                                                    <div>
                                                        <p className="text-sm font-bold text-gray-800">{doc.title}</p>
                                                        <p className="text-xs text-gray-500 mt-1">{doc.type} • ขนาด {doc.size}</p>
                                                    </div>
                                                </div>
                                                <button 
                                                    onClick={() => {
                                                        if (doc.url) {
                                                            window.open(doc.url, '_blank');
                                                        } else {
                                                            addToast(`กำลังเริ่มดาวน์โหลด: ${doc.title}`, 'info');
                                                        }
                                                    }}
                                                    className="text-blue-600 hover:text-white hover:bg-blue-600 p-2 rounded-lg transition-colors border border-blue-100 hover:border-blue-600"
                                                    title="ดาวน์โหลด"
                                                >
                                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                                                </button>
                                            </li>
                                        ))}
                                    </ul>
                                </div>
                                <div className="p-4 border-t border-gray-100 bg-gray-50 flex justify-end">
                                    <button 
                                        onClick={() => setShowDocs(false)}
                                        className="px-5 py-2 bg-gray-200 text-gray-700 hover:bg-gray-300 rounded-lg text-sm font-medium transition-colors"
                                    >
                                        ปิดหน้าต่าง
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    <style dangerouslySetInnerHTML={{__html: `
                        @keyframes fadeInUp {
                            from { opacity: 0; transform: translateY(10px); }
                            to { opacity: 1; transform: translateY(0); }
                        }
                        .animate-fade-in-up {
                            animation: fadeInUp 0.3s ease-out forwards;
                        }
                    `}} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
